<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="btitle bdesc">
  <title id="btitle">Aardvark — Telegram Email Delta Chat Relay</title>
  <desc id="bdesc">Relay service that mirrors Telegram channels to Delta Chat broadcast channels and e-mail recipients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#0d3040"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <ellipse cx="155" cy="100" rx="250" ry="160" fill="#2aabee" fill-opacity="0.26" filter="url(#blur)"/>
  <ellipse cx="980" cy="40"  rx="190" ry="120" fill="#3daa8a" fill-opacity="0.17" filter="url(#blur)"/>
  <ellipse cx="1020" cy="440" rx="260" ry="170" fill="#00c8a8" fill-opacity="0.14" filter="url(#blur)"/>
  <g opacity="0.1" stroke="#ffffff" stroke-width="1">
    <line x1="640"  y1="48" x2="534" y2="458"/>
    <line x1="694"  y1="48" x2="588" y2="458"/>
    <line x1="748"  y1="48" x2="642" y2="458"/>
    <line x1="802"  y1="48" x2="696" y2="458"/>
    <line x1="856"  y1="48" x2="750" y2="458"/>
    <line x1="910"  y1="48" x2="804" y2="458"/>
    <line x1="964"  y1="48" x2="858" y2="458"/>
    <line x1="1018" y1="48" x2="912" y2="458"/>
    <line x1="1072" y1="48" x2="966" y2="458"/>
    <line x1="1126" y1="48" x2="1020" y2="458"/>
  </g>
  <!-- Horizontal grid lines spanning the right panel area -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="1">
    <line x1="600" y1="90"  x2="1150" y2="90"/>
    <line x1="600" y1="136" x2="1150" y2="136"/>
    <line x1="600" y1="182" x2="1150" y2="182"/>
    <line x1="600" y1="228" x2="1150" y2="228"/>
    <line x1="600" y1="274" x2="1150" y2="274"/>
    <line x1="600" y1="320" x2="1150" y2="320"/>
    <line x1="600" y1="366" x2="1150" y2="366"/>
    <line x1="600" y1="412" x2="1150" y2="412"/>
    <line x1="600" y1="458" x2="1150" y2="458"/>
  </g>
  <g font-family="Inter, Arial, Helvetica, sans-serif">
    <!-- Category badge — teal border to match the project accent -->
    <rect x="72" y="52" width="248" height="36" rx="18" fill="#071018" fill-opacity="0.62" stroke="#00c8a8" stroke-opacity="0.50"/>
    <text x="196" y="76" text-anchor="middle" fill="#96c4d4" font-size="17" font-weight="700">Telegram → Delta Chat</text>
    <!-- Title: codename big, then two descriptor lines -->
    <text x="72" y="158" fill="#f0f8ff" font-size="72" font-weight="800">Aardvark</text>
    <text x="72" y="224" fill="#f0f8ff" font-size="52" font-weight="800">Telegram</text>
    <text x="72" y="284" fill="#f0f8ff" font-size="52" font-weight="800">Relay</text>
    <!-- Accent underline -->
    <rect x="72" y="302" width="156" height="7" rx="3" fill="#00c8a8"/>
    <!-- Description -->
    <text x="72" y="346" fill="#f0f8ff" font-size="22" font-weight="600">Mirror Telegram channels to</text>
    <text x="72" y="372" fill="#f0f8ff" font-size="22" font-weight="600">Delta Chat &amp; e-mail.</text>
    <text x="72" y="408" fill="#96c4d4" font-size="15">Python · Telethon · Delta Chat RPC · cross-platform</text>
    <!-- Feature badges -->
    <rect x="72"  y="448" width="138" height="34" rx="16" fill="#071018" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="141" y="470" text-anchor="middle" fill="#f0f8ff" font-size="14" font-weight="700">Burst limiter</text>
    <rect x="224" y="448" width="120" height="34" rx="16" fill="#071018" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="284" y="470" text-anchor="middle" fill="#f0f8ff" font-size="14" font-weight="700">Hot reload</text>
    <rect x="358" y="448" width="148" height="34" rx="16" fill="#071018" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="432" y="470" text-anchor="middle" fill="#f0f8ff" font-size="14" font-weight="700">Proxy support</text>
    <!-- Right "How it works" panel — symmetric 36 px margins on both sides -->
    <rect x="610" y="72" width="540" height="392" rx="28" fill="#040c16" fill-opacity="0.86" stroke="#2a8099" stroke-opacity="0.40"/>
    <text x="646" y="118" fill="#f0f8ff" font-size="24" font-weight="700">How it works</text>
    <text x="646" y="145" fill="#96c4d4" font-size="15">Reads Telegram via MTProto, mirrors posts to Delta</text>
    <text x="646" y="163" fill="#96c4d4" font-size="15">Chat broadcast channels and e-mail recipients.</text>
    <!-- Card 1: Telegram source -->
    <g>
      <rect x="646" y="186" width="132" height="128" rx="20" fill="#0b1a2e" fill-opacity="0.92" stroke="#2aabee" stroke-opacity="0.74" stroke-width="2"/>
      <rect x="662" y="200" width="100" height="7" rx="3" fill="#2aabee"/>
      <circle cx="682" cy="217" r="9" fill="#2aabee" fill-opacity="0.18" stroke="#2aabee"/>
      <text x="712" y="252" text-anchor="middle" fill="#f0f8ff" font-size="19" font-weight="700">Telegram</text>
      <text x="712" y="281" text-anchor="middle" fill="#96c4d4" font-size="14">MTProto</text>
      <text x="712" y="299" text-anchor="middle" fill="#96c4d4" font-size="14">channels</text>
    </g>
    <!-- Card 2: Aardvark relay -->
    <g>
      <rect x="814" y="186" width="132" height="128" rx="20" fill="#0b1a2e" fill-opacity="0.92" stroke="#00c8a8" stroke-opacity="0.74" stroke-width="2"/>
      <rect x="830" y="200" width="100" height="7" rx="3" fill="#00c8a8"/>
      <circle cx="850" cy="217" r="9" fill="#00c8a8" fill-opacity="0.18" stroke="#00c8a8"/>
      <text x="880" y="252" text-anchor="middle" fill="#f0f8ff" font-size="19" font-weight="700">Aardvark</text>
      <text x="880" y="281" text-anchor="middle" fill="#96c4d4" font-size="14">Relay</text>
      <text x="880" y="299" text-anchor="middle" fill="#96c4d4" font-size="14">service</text>
    </g>
    <!-- Card 3: Delivery targets -->
    <g>
      <rect x="982" y="186" width="132" height="128" rx="20" fill="#0b1a2e" fill-opacity="0.92" stroke="#3daa7a" stroke-opacity="0.74" stroke-width="2"/>
      <rect x="998" y="200" width="100" height="7" rx="3" fill="#3daa7a"/>
      <circle cx="1018" cy="217" r="9" fill="#3daa7a" fill-opacity="0.18" stroke="#3daa7a"/>
      <text x="1048" y="248" text-anchor="middle" fill="#f0f8ff" font-size="17" font-weight="700">Delta Chat</text>
      <text x="1048" y="272" text-anchor="middle" fill="#96c4d4" font-size="14">&amp; E-mail</text>
      <text x="1048" y="290" text-anchor="middle" fill="#96c4d4" font-size="14">delivery</text>
    </g>
    <!-- Arrows between cards -->
    <g fill="none" stroke-linecap="round" stroke-width="5">
      <line x1="778" y1="250" x2="804" y2="250" stroke="#2aabee"/>
      <polygon points="804,250 791,242 791,258" fill="#2aabee" stroke="none"/>
      <line x1="946" y1="250" x2="972" y2="250" stroke="#00c8a8"/>
      <polygon points="972,250 959,242 959,258" fill="#00c8a8" stroke="none"/>
    </g>
    <!-- Panel bottom text -->
    <text x="646" y="354" fill="#96c4d4" font-size="15">Runs as a system service on Linux, macOS, and Windows.</text>
    <text x="646" y="372" fill="#96c4d4" font-size="15">Hot-reloads config and prevents duplicate delivery.</text>
    <!-- Info row -->
    <text x="646" y="444" fill="#96c4d4" font-size="13" fill-opacity="0.7">Python  ·  Telethon  ·  Delta Chat RPC  ·  GPL-3.0</text>
  </g>
</svg>
